<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumair Loya - Invitation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&family=Cinzel:wght@400;700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Poppins', sans-serif; background: #fdfaf3;
            display: flex; justify-content: center; align-items: center; overflow-x: hidden;
        }

        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; cursor: pointer; transition: 0.8s ease-in-out;
        }

        .play-icon { font-size: 50px; color: #8c6a46; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.1);} 100% {transform: scale(1);} }

        #main-card {
            width: 90%; max-width: 480px; background: #fff; 
            padding: 40px 25px; text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.1); 
            border: 2px solid #e0d5c1; border-radius: 12px;
            display: none; opacity: 0;
        }

        .bismillah { font-family: 'Great Vibes', cursive; font-size: 2.2rem; color: #333; margin-bottom: 10px; }
        .invited-by { font-size: 1rem; font-weight: 600; color: #333; margin: 10px 0; }
        .event-title { font-weight: 700; font-size: 1.2rem; color: #333; }
        .names { font-family: 'Great Vibes', cursive; font-size: 2.2rem; color: #a17c4f; margin: 15px 0; }
        .venue { margin-top: 25px; font-size: 0.95rem; color: #555; line-height: 1.6; }
    </style>
</head>
<body onclick="startInvite()">

    <audio id="inviteMusic" loop>
        <source src="song.mp3.mp3" type="audio/mpeg">
    </audio>

    <div id="welcome-screen">
        <div class="play-icon">✨</div>
        <h2 style="font-family: 'Poppins', sans-serif; font-weight: 400; color: #8c6a46; letter-spacing: 3px;">WELCOME</h2>
        <p style="color: #888;">Tap anywhere to open the Invitation</p>
    </div>

    <div id="main-card">
        <div class="bismillah">Bismillah-hir-Rahman-nir-Rahim</div>
        <div class="invited-by">Mr & Mrs Shakeel Loya</div>
        <div class="event-title">Engagement Party 🥳</div>
        <div class="names">Sumair Loya & ...</div>
        <div style="font-size: 1.5rem; margin: 10px 0;">&</div>
        <div class="event-title">Aqeeqah Ceremony 🤩</div>
        <div style="font-size: 0.9rem; font-weight: 600;">M.Hamdan & Mudassir</div>
        <div style="font-size: 1rem; color: #333; margin-top: 20px;">
            <strong>Friday 17 April 2026</strong>
        </div>
        <div class="venue">
            At: <strong>Orchid Event Solution</strong><br>
            FB Area Block 4, Gullberg Town, Karachi
        </div>
    </div>

    <script>
        function startInvite() {
            var audio = document.getElementById("inviteMusic");
            var screen = document.getElementById("welcome-screen");
            var card = document.getElementById("main-card");

            // Browser security ki wajah se click par hi music play hota hai
            audio.play().catch(function(error) {
                console.log("Music play failed:", error);
            });

            screen.style.opacity = "0";
            setTimeout(function() {
                screen.style.display = "none";
                card.style.display = "block";
                setTimeout(function() { card.style.opacity = "1"; }, 100);
            }, 800);
        }
    </script>
</body>
</html>
