<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Hasnain - Nikkah Invitation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&family=Cinzel:wght@400;700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Poppins', sans-serif; background: #fdfaf3;
            background-image: url('https://www.transparenttextures.com/patterns/marble-white.png');
            display: flex; justify-content: center; align-items: center; overflow-x: hidden;
        }

        /* Initial Screen to enable Audio */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #fffaf0, #e0d5c1); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .enter-btn {
            background: white; border: 1px solid #8c6a46; color: #8c6a46;
            padding: 15px 50px; font-family: 'Cinzel', serif; letter-spacing: 4px;
            cursor: pointer; transition: 0.5s; border-radius: 50px; font-size: 1rem;
            box-shadow: 0 10px 20px rgba(140, 106, 70, 0.1);
        }

        .enter-btn:hover { background: #8c6a46; color: #fff; transform: translateY(-5px); }

        /* Main Invitation Card */
        .card-container {
            width: 85%; max-width: 450px; background: #fff; padding: 60px 35px;
            text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.15);
            border: 1px solid #e0d5c1; position: relative; display: none;
            border-radius: 5px;
        }

        /* Advanced Floating Animations */
        .float-in { opacity: 0; animation: floatIn 1.8s ease-out forwards; }
        .slide-left { opacity: 0; animation: slideLeft 1.8s ease-out forwards; }
        .slide-right { opacity: 0; animation: slideRight 1.8s ease-out forwards; }

        @keyframes floatIn { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideLeft { from { transform: translateX(-60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideRight { from { transform: translateX(60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
