<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Hooriya ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2d0b1e, #0b0512);
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: #fff;
        }

        #game-screen, #apology-screen {
            text-align: center; padding: 20px;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 3rem; margin-bottom: 30px; color: #ffbd59; }
        
        .buttons { display: flex; gap: 20px; justify-content: center; }
        
        button {
            padding: 15px 30px; font-size: 1.2rem; cursor: pointer;
            border: none; border-radius: 50px; font-weight: 600;
            transition: transform 0.2s;
        }

        #yesBtn { background: #ff4071; color: white; }
        #noBtn { background: #fff; color: #333; position: absolute; }

        /* Apology Screen Styling */
        #apology-screen { display: none; }
        .teddy { font-size: 8rem; margin: 10px 0; }
        .chocolates { font-size: 3rem; margin: 10px 0; }
        .message { 
            font-size: 1.3rem; line-height: 1.6; max-width: 400px;
            color: #f2e6ff; background: rgba(255,255,255,0.1);
            padding: 20px; border-radius: 20px;
        }
    </style>
</head>
<body>

    <div id="game-screen">
        <h1>DO YOU LOVE ME?</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="showApology()">YES</button>
            <button id="noBtn">NO</button>
        </div>
    </div>

    <div id="apology-screen">
        <div class="teddy">🧸</div>
        <h2 style="color: #ffbd59; font-family: 'Dancing Script', cursive;">SO SORRY!</h2>
        <div class="chocolates">🍫 🍫</div>
        <p class="message">
            "Sorry Hooriya Muje Maaf kardooo kal raat ko mene bhut guussa kara tumhee hurt kara ab maaf kerdoo meri Jaan please man jaooo baby ."
        </p>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');

        // Function to move NO button
        function moveNoButton() {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // Event listeners for No button (both mouse and touch for mobile)
        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', moveNoButton);

        function showApology() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('apology-screen').style.display = 'block';
        }
    </script>
</body>
</html>
