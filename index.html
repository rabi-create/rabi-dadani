<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Hooriya ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght=700&family=Poppins:wght=400;600&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2d0b1e, #0b0512);
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: #fff; -webkit-tap-highlight-color: transparent;
        }

        #game-screen, #apology-screen {
            text-align: center; padding: 20px; width: 100%; max-width: 400px;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 3rem; margin-bottom: 40px; color: #ffbd59; }
        
        /* Fixed Button Layout Layer */
        .buttons-wrapper { 
            position: relative; 
            width: 100%; 
            height: 80px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 30px;
        }
        
        button {
            padding: 15px 35px; font-size: 1.2rem; cursor: pointer;
            border: none; border-radius: 50px; font-weight: 600;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #yesBtn { 
            background: #ff4071; 
            color: white; 
            z-index: 10;
        }
        
        #noBtn { 
            background: #fff; 
            color: #333; 
            position: absolute;
            /* Default Starting Position right next to YES */
            transform: translateX(80px); 
            z-index: 10;
        }

        /* Apology Screen Styling */
        #apology-screen { display: none; }
        .teddy { font-size: 8rem; margin: 10px 0; animation: bounce 2s infinite alternate; }
        .chocolates { font-size: 3.5rem; margin: 15px 0; letter-spacing: 10px; }
        .message { 
            font-size: 1.15rem; line-height: 1.6;
            color: #f2e6ff; background: rgba(255,255,255,0.06);
            padding: 25px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: justify;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div id="game-screen">
        <h1>DO YOU LOVE ME?</h1>
        <div class="buttons-wrapper">
            <button id="yesBtn" onclick="showApology()">YES</button>
            <button id="noBtn">NO</button>
        </div>
    </div>

    <div id="apology-screen">
        <div class="teddy">🧸</div>
        <h2 style="color: #ffbd59; font-family: 'Dancing Script', cursive; font-size: 2.5rem; margin: 5px 0;">SO SORRY!</h2>
        <div class="chocolates">🍫🍫</div>
        <p class="message">
            "Sorry Hooriya Muje Maaf kardooo kal raat ko mene bhut guussa kara tumhee hurt kara ab maaf kerdoo meri Jaan please man jaooo baby ."
        </p>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');

        // Function to randomly scatter NO button across screen bounds
        function moveNoButton(e) {
            e.preventDefault();
            
            // Remove the initial transform offset once the chase begins
            noBtn.style.transform = 'none';
            
            // Calculate random safe coordinates
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;
            
            const randomX = Math.max(10, Math.floor(Math.random() * maxX));
            const randomY = Math.max(10, Math.floor(Math.random() * maxY));
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Event listeners to trigger on hover (PC) or tap (Mobile)
        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', moveNoButton);

        function showApology() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('apology-screen').style.display = 'block';
        }
    </script>
</body>
</html>
