<!DOCTYPE html>
<html>
<head>
    <title>For My Love ❤️</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #ffe6e6;
            padding-top: 100px;
        }
        h1 {
            color: #ff4d4d;
        }
        button {
            padding: 10px 20px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>
<body>

<h1>Hi My Love ❤️</h1>
<p>Click the button for a surprise</p>

<button onclick="showLove()">Click Me</button>

<p id="message"></p>

<script>
function showLove() {
    document.getElementById("message").innerHTML =
    "I love you so much 💖 You are my happiness 😘";
}
</script>

</body>
</html>
